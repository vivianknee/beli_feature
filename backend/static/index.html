<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beli Reel Saver</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 48px 16px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
      padding: 32px;
      width: 100%;
      max-width: 520px;
      height: fit-content;
    }

    h1 { font-size: 22px; font-weight: 800; color: #111; margin-bottom: 4px; }
    .subtitle { font-size: 14px; color: #888; margin-bottom: 24px; }

    .input-row {
      display: flex;
      gap: 8px;
    }

    input[type="url"] {
      flex: 1;
      border: 1.5px solid #ddd;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="url"]:focus { border-color: #2e7d52; }

    button {
      background: #2e7d52;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    button:disabled { background: #a0c4b0; cursor: not-allowed; }
    button:not(:disabled):hover { background: #256642; }

    /* Status */
    .status {
      margin-top: 20px;
      font-size: 13px;
      color: #888;
      display: none;
    }
    .status.visible { display: flex; align-items: center; gap: 8px; }

    .spinner {
      width: 14px; height: 14px;
      border: 2px solid #ccc;
      border-top-color: #2e7d52;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Results */
    .results { margin-top: 24px; display: none; }
    .results.visible { display: block; }

    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .results-header h2 { font-size: 15px; font-weight: 700; color: #111; }
    .select-all {
      font-size: 13px;
      color: #2e7d52;
      cursor: pointer;
      font-weight: 600;
      background: none;
      border: none;
      padding: 0;
    }
    .select-all:hover { text-decoration: underline; }

    .place-list { display: flex; flex-direction: column; gap: 8px; }

    .place-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border: 1.5px solid #eee;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
      user-select: none;
    }
    .place-item:hover { background: #f9f9f9; }
    .place-item.selected { background: #f0faf5; border-color: #a8d5bc; }

    .place-emoji { font-size: 20px; flex-shrink: 0; }

    .place-info { flex: 1; min-width: 0; }
    .place-name { font-size: 15px; font-weight: 600; color: #111; }
    .place-meta { font-size: 12px; color: #aaa; margin-top: 2px; text-transform: capitalize; }

    .checkbox {
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 2px solid #ccc;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.12s, border-color 0.12s;
      font-size: 12px;
      color: transparent;
    }
    .place-item.selected .checkbox {
      background: #2e7d52;
      border-color: #2e7d52;
      color: #fff;
    }

    .save-row { margin-top: 16px; }
    #saveBtn { width: 100%; padding: 14px; font-size: 15px; border-radius: 12px; }

    .error {
      margin-top: 16px;
      padding: 12px 14px;
      background: #fff0f0;
      border: 1.5px solid #fcc;
      border-radius: 10px;
      font-size: 13px;
      color: #c0392b;
      display: none;
    }
    .error.visible { display: block; }

    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #111;
      color: #fff;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      transition: transform 0.3s ease;
      pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
  <div class="card">
    <h1>Beli Bookmarker</h1>
    <p class="subtitle">Paste a TikTok or Instagram Reel link to extract food places</p>

    <div class="input-row">
      <input type="url" id="urlInput" placeholder="https://www.tiktok.com/@..." />
      <button id="extractBtn" onclick="extract()">Extract</button>
    </div>

    <div class="status" id="status">
      <div class="spinner"></div>
      <span id="statusText">Downloading video...</span>
    </div>

    <div class="error" id="error"></div>

    <div class="results" id="results">
      <div class="results-header">
        <h2 id="resultsTitle">Found 0 places</h2>
        <button class="select-all" id="selectAllBtn" onclick="selectAll()">Select all</button>
      </div>
      <div class="place-list" id="placeList"></div>
      <div class="save-row">
        <button id="saveBtn" onclick="save()">Save to Beli</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const TYPE_EMOJI = {
      restaurant: "🍽️",
      cafe: "☕️",
      bakery: "🥐",
      bar: "🍸",
      food_stall: "🥡",
      unknown: "📍",
    };

    let places = [];
    let selected = new Set();

    const STATUS_STEPS = [
      "Downloading video...",
      "Transcribing audio...",
      "Extracting place names...",
    ];
    let stepTimer;

    function cycleStatus() {
      let i = 0;
      document.getElementById("statusText").textContent = STATUS_STEPS[0];
      stepTimer = setInterval(() => {
        i = Math.min(i + 1, STATUS_STEPS.length - 1);
        document.getElementById("statusText").textContent = STATUS_STEPS[i];
      }, 15000); // rough timing — each step takes ~15s
    }

    async function extract() {
      const url = document.getElementById("urlInput").value.trim();
      if (!url) return;

      // Reset UI
      setError("");
      setResults([]);
      setStatus(true);
      setExtracting(true);
      cycleStatus();

      try {
        const resp = await fetch("/api/extract", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ video_url: url }),
        });

        const data = await resp.json();

        if (!resp.ok) {
          throw new Error(data.detail ?? "Extraction failed");
        }

        setResults(data.places ?? []);
      } catch (err) {
        setError(err.message);
      } finally {
        setStatus(false);
        setExtracting(false);
        clearInterval(stepTimer);
      }
    }

    function setExtracting(on) {
      const btn = document.getElementById("extractBtn");
      btn.disabled = on;
      btn.textContent = on ? "Extracting..." : "Extract";
    }

    function setStatus(visible) {
      document.getElementById("status").classList.toggle("visible", visible);
    }

    function setError(msg) {
      const el = document.getElementById("error");
      el.textContent = msg;
      el.classList.toggle("visible", !!msg);
    }

    function setResults(newPlaces) {
      places = newPlaces;
      selected = new Set(places.map(p => p.name)); // select all by default

      const resultsEl = document.getElementById("results");
      resultsEl.classList.toggle("visible", places.length > 0);

      document.getElementById("resultsTitle").textContent =
        `Found ${places.length} place${places.length !== 1 ? "s" : ""}`;

      renderList();
    }

    function renderList() {
      const list = document.getElementById("placeList");
      list.innerHTML = places.map(p => {
        const emoji = TYPE_EMOJI[p.type] ?? "📍";
        const isSelected = selected.has(p.name);
        const conf = Math.round((p.confidence ?? 0) * 100);
        return `
          <div class="place-item ${isSelected ? "selected" : ""}" onclick="toggle('${escHtml(p.name)}')">
            <span class="place-emoji">${emoji}</span>
            <div class="place-info">
              <div class="place-name">${escHtml(p.name)}</div>
              <div class="place-meta">${p.type ?? "place"} · ${conf}% confidence · via ${p.source}</div>
            </div>
            <div class="checkbox">${isSelected ? "✓" : ""}</div>
          </div>`;
      }).join("");

      document.getElementById("saveBtn").textContent =
        selected.size > 0 ? `Save ${selected.size} to Beli` : "Save to Beli";
      document.getElementById("saveBtn").disabled = selected.size === 0;

      const allSelected = selected.size === places.length;
      const btn = document.getElementById("selectAllBtn");
      btn.textContent = allSelected ? "Deselect all" : "Select all";
      btn.onclick = allSelected ? deselectAll : selectAll;
    }

    function toggle(name) {
      selected.has(name) ? selected.delete(name) : selected.add(name);
      renderList();
    }

    function selectAll() {
      selected = new Set(places.map(p => p.name));
      renderList();
    }

    function deselectAll() {
      selected = new Set();
      renderList();
    }

    function save() {
      // Dummy save for now — shows what would be sent to Beli
      const names = Array.from(selected);
      showToast(`Saved: ${names.join(", ")}`);
    }

    function showToast(msg) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 3000);
    }

    function escHtml(str) {
      return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    // Allow pressing Enter in the input
    document.getElementById("urlInput").addEventListener("keydown", e => {
      if (e.key === "Enter") extract();
    });
  </script>
</body>
</html>
